baseURL = "https://lifestylelabsho.github.io/"
languageCode = "ko-kr"
title = "lifestylelabsho 쇼핑 블로그"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
summaryLength = 35

[pagination]
pagerSize = 12

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup]
	[markup.goldmark]
		[markup.goldmark.renderer]
			unsafe = true

[minify]
disableXML = false
minifyOutput = true

[sitemap]
changefreq = "daily"
priority = 0.7
filename = "sitemap.xml"

[permalinks]
posts = "/posts/:slug/"

[params]
defaultTheme = "auto"
disableThemeToggle = false
ShowShareButtons = true
ShowReadingTime = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false
env = "production"
description = "스마트한 라이프스타일을 위한 생활용품 쇼핑 블로그입니다. 주방, 욕실, 수납 등 일상을 편리하게 만들어주는 실용적인 홈 리빙 아이템을 매일 큐레이션합니다"
keywords = ["라이프스타일쇼핑", "생활용품추천", "스마트홈리빙", "주방소품", "수납용품"]
images = ["/images/og-default.webp"]

# Search engine verification (set only when needed)
googleSiteVerification = ""
naverSiteVerification = ""
bingSiteVerification = ""
yandexSiteVerification = ""

[params.homeInfoParams]
Title = "스마트한 일상을 위한 라이프스타일랩 홈리빙 추천"
Content = "바쁜 일상을 더 스마트하게 만들어줄 생활용품을 찾고 계신가요? 라이프스타일랩에서는 주방, 욕실, 수납공간 등 생활 곳곳에서 활용도 높은 홈 리빙 아이템을 매일 엄선해 소개합니다. 편리한 주방 도구부터 깔끔한 수납 솔루션까지, 당신의 일상을 한층 스마트하게 업그레이드해줄 제품들을 만나보세요."

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 2
keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 5

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "categories"
name = "Categories"
url = "/categories/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 30
